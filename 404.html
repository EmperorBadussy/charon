<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — SIGNAL LOST | CHARON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #000000;
    --bg-surface: #060B0F;
    --cyan-core: #06B6D4;
    --cyan-bright: #22D3EE;
    --cyan-vivid: #67E8F9;
    --cyan-hot: #A5F3FC;
    --cyan-white: #ECFEFF;
    --glow-neon: 0 0 4px #67E8F9, 0 0 12px rgba(103,232,249,0.5), 0 0 30px rgba(34,211,238,0.3), 0 0 60px rgba(6,182,212,0.15);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-void);
    color: var(--cyan-white);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  canvas#static {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.08;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .signal-lost {
    font-family: 'Orbitron', sans-serif;
    font-weight: 300;
    font-size: clamp(0.8rem, 2vw, 1rem);
    color: var(--cyan-bright);
    letter-spacing: 0.4em;
    margin-bottom: 1rem;
    text-shadow: var(--glow-neon);
  }
  .four-oh-four {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(6rem, 20vw, 14rem);
    color: var(--cyan-bright);
    text-shadow: var(--glow-neon);
    line-height: 1;
    animation: glitch404 4s infinite;
    position: relative;
  }
  @keyframes glitch404 {
    0%, 100% { text-shadow: var(--glow-neon); transform: none; }
    2% { text-shadow: -4px 0 #06B6D4, 4px 0 #67E8F9; transform: translateX(-2px); clip-path: inset(20% 0 40% 0); }
    4% { text-shadow: var(--glow-neon); transform: none; clip-path: none; }
    50% { text-shadow: var(--glow-neon); transform: none; }
    52% { text-shadow: 3px 0 #A5F3FC, -3px 0 #06B6D4; transform: translateX(2px); clip-path: inset(60% 0 10% 0); }
    54% { text-shadow: var(--glow-neon); transform: none; clip-path: none; }
  }
  .msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(0.7rem, 1.5vw, 0.85rem);
    color: var(--cyan-hot);
    margin-top: 1rem;
    opacity: 0.7;
  }
  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 2.5rem;
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: var(--cyan-bright);
    text-decoration: none;
    border: 1px solid var(--cyan-bright);
    padding: 0.8rem 2rem;
    border-radius: 8px;
    transition: all 0.3s;
  }
  .home-link:hover {
    background: rgba(34,211,238,0.1);
    box-shadow: 0 0 20px rgba(34,211,238,0.3), 0 0 40px rgba(6,182,212,0.15);
    color: var(--cyan-white);
  }
</style>
</head>
<body>
<canvas id="static"></canvas>
<div class="content">
  <div class="signal-lost">SIGNAL LOST</div>
  <div class="four-oh-four">404</div>
  <div class="msg">The ferryman could not find this page.</div>
  <a href="/" class="home-link">&larr; RETURN TO SHORE</a>
</div>
<script>
(function() {
  var c = document.getElementById('static');
  var ctx = c.getContext('2d');
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  function draw() {
    var img = ctx.createImageData(c.width, c.height);
    var d = img.data;
    for (var i = 0; i < d.length; i += 4) {
      var v = Math.random() * 255;
      d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
